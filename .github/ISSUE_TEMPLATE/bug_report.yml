name: 🐞 Bug report
description: Report a defect in http-queryable
title: "fix: <short description>"
labels: ["bug", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to file a bug! Please fill out the sections
        below. For **security vulnerabilities**, do **not** use this form — see
        our [Security Policy](../../security/policy).
  - type: checkboxes
    id: preflight
    attributes:
      label: Preflight checklist
      options:
        - label: I searched existing issues and this has not been reported.
          required: true
        - label: I am running Node.js >= 22 (`node --version`).
          required: true
        - label: This is not a security vulnerability (those go through the Security Policy).
          required: true
  - type: input
    id: version
    attributes:
      label: http-queryable version
      placeholder: 0.1.0
    validations:
      required: true
  - type: dropdown
    id: adapter
    attributes:
      label: Which surface is affected?
      multiple: true
      options:
        - Core (cache key / normalization)
        - Cache engine
        - Express adapter
        - Fastify adapter
        - Raw http adapter
        - Client
        - Types / build
        - Docs
    validations:
      required: true
  - type: input
    id: node
    attributes:
      label: Node.js version
      placeholder: v22.16.0
    validations:
      required: true
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: A clear description of the bug, including any error output.
      placeholder: When I send a QUERY with body X, I get …
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: What did you expect to happen?
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Minimal reproduction
      description: >
        A minimal code snippet or repo. For caching bugs, include the exact
        request bodies and Content-Type headers — cache-key issues depend on the
        precise bytes.
      render: js
    validations:
      required: true
  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Anything else — proxy/CDN in front, OS, TypeScript version, etc.
    validations:
      required: false
