name: Lint PR title

# The PR title becomes the squash-merge commit and feeds the changelog, so it
# must be a valid Conventional Commit.

on:
  pull_request_target:
    types: [opened, edited, synchronize, reopened]

permissions:
  pull-requests: read

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: amannn/action-semantic-pull-request@v5
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          types: |
            feat
            fix
            perf
            docs
            style
            test
            refactor
            build
            ci
            chore
            revert
          requireScope: false
